name: Create Limited Repositories

on:
  workflow_dispatch:

jobs:
  create_repos:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MY_PAT }}
      USERNAME: Dippp10

    steps:
      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Create limited repositories safely
        run: |
          NUM_REPOS=20

          for i in $(seq 1 $NUM_REPOS); do

            # Check remaining rate limit
            REMAINING=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/rate_limit | jq '.rate.remaining')

            echo "Remaining API calls: $REMAINING"

            if [ "$REMAINING" -lt 50 ]; then
              echo "Rate limit almost exhausted. Stopping."
              break
            fi

            REPO_NAME="auto-repo-$i-$(date +%s)"

            curl -s -H "Authorization: token $GH_TOKEN" \
              -d "{\"name\":\"$REPO_NAME\", \"auto_init\":true}" \
              https://api.github.com/user/repos

            sleep 3
          done
