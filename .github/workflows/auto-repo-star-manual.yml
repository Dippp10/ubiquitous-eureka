name: Create Limited Repositories

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_repos:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MY_PAT }}
      USERNAME: Dippp10

    steps:
      - name: Create and star repositories safely
        run: |
          NUM_REPOS=500   # ⚠️ Increase at your own risk

          for i in $(seq 1 $NUM_REPOS); do

            # Check remaining rate limit
            REMAINING=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/rate_limit | jq '.rate.remaining')

            echo "Remaining API calls: $REMAINING"

            if [ "$REMAINING" -lt 100 ]; then
              echo "Rate limit getting low. Stopping."
              break
            fi

            REPO_NAME="auto-repo-$i-$(date +%s)"
            echo "Creating repository: $REPO_NAME"

            # Create repository
            CREATE_STATUS=$(curl -s -o create_response.json -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"name\":\"$REPO_NAME\", \"auto_init\":true}" \
              https://api.github.com/user/repos)

            if [ "$CREATE_STATUS" -ne 201 ]; then
              echo "Failed to create repository"
              cat create_response.json
              exit 1
            fi

            echo "Repository created successfully"

            # Star repository
            STAR_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user/starred/$USERNAME/$REPO_NAME)

            if [ "$STAR_STATUS" -eq 204 ]; then
              echo "Repository starred successfully ✅"
            else
              echo "Failed to star repository"
              exit 1
            fi

            echo "Completed $REPO_NAME"
            echo "-----------------------------------"

            sleep 5
          done
