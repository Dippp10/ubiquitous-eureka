name: Scheduled Create and Star Repositories

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at midnight UTC
  workflow_dispatch:      # Optional manual trigger

jobs:
  create-star-multiple:
    runs-on: ubuntu-latest

    steps:
      - name: Set up GitHub CLI
        run: sudo apt update && sudo apt install gh -y

      - name: Create and Star Repositories
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          # Number of repositories to create per run
          NUM_REPOS=3

          for i in $(seq 1 $NUM_REPOS); do
            REPO_NAME="auto-repo-${{ github.run_number }}-$i"
            echo "Creating repository $REPO_NAME"

            # Create repo using GH_TOKEN directly
            gh repo create "$REPO_NAME" \
              --public \
              --description "Auto-created repo #$i by GitHub Actions" \
              --confirm

            # Create a temporary folder for the repo
            mkdir $REPO_NAME
            cd $REPO_NAME

            # Add unique README content
            echo "# $REPO_NAME" > README.md
            echo "Created on $(date -u)" >> README.md
            echo "This repository was auto-generated via GitHub Actions." >> README.md

            # Initialize git, commit, push
            git init
            git add README.md
            git commit -m "Add README"
            git branch -M main
            git remote add origin https://github.com/${{ github.repository_owner }}/$REPO_NAME.git
            git push -u origin main

            # Add topics for visibility
            gh repo edit "$REPO_NAME" --add-topic "automation" --add-topic "github-actions" --add-topic "demo"

            # Star the repository
            curl -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/user/starred/${{ github.repository_owner }}/$REPO_NAME

            # Go back to root directory for next repo
            cd ..
          done
