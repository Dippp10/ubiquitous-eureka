name: Create and Star Repositories Safely

on:
  schedule:
    - cron: '0 */4 * * *'  # Runs every 4 hours
  workflow_dispatch:      # Manual trigger if needed

jobs:
  create_and_star:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MY_PAT }}
      USERNAME: YourGitHubUsername
      REPOS_PER_INTERVAL: 30

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Create and star repositories
        run: |
          for i in $(seq 1 $REPOS_PER_INTERVAL); do
            REPO_NAME="auto-repo-$(date +%s)-$i"
            curl -H "Authorization: token $GH_TOKEN" \
                 -d "{\"name\":\"$REPO_NAME\",\"auto_init\":true}" \
                 https://api.github.com/user/repos
            # Star the repo
            curl -X PUT -H "Authorization: token $GH_TOKEN" \
                 -H "Content-Length: 0" \
                 https://api.github.com/user/starred/$USERNAME/$REPO_NAME
            # Random delay 10–30 seconds
            sleep $((RANDOM % 21 + 10))
          done

